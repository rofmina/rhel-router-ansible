---
- name: rhel-router-3nic
  hosts: all
  become: yes
  vars:
    # External (bridge) - highest priority
    external_static_ip: "10.0.0.190"
    external_cidr: "24"
    external_gateway: "10.0.0.1"
    external_dns: "24.200.243.189"
    external_dns2: "24.201.245.77"

    # External-nat (WiFi/fallback) - auto DHCP

    # Intranet (internal VMs)
    intranet_static_ip: "10.0.1.1"
    intranet_cidr: "24"
    domain_name: "labnet"
    dns_server_ip: "{{ external_dns }}"
    dhcp_ip_range_start: "10.0.1.2"
    dhcp_ip_range_end: "10.0.1.16"
    dhcp_lease_time: "12h"

  tasks:
    - name: Check to make sure there are only four network interfaces (including lo)
      fail:
        msg: "There are {{ ansible_interfaces | length }} interfaces. Expected 4 (lo + 3 NICs)."
      when: ansible_interfaces | length != 4

    - name: Delete old connections and reload NetworkManager
      shell: |
        nmcli -t -f NAME,UUID con show | while IFS=: read -r name uuid; do
          if [[ "$name" != "lo" ]]; then
            nmcli con del "$uuid" 2>/dev/null || true
          fi
        done
        nmcli con reload
        sleep 2

    - name: Refresh facts after cleanup
      setup:

    - name: Identify interfaces by MAC address patterns
      set_fact:
        # Get interface details from ansible facts
        interface_info: "{{ interface_info | default([]) +
          [{'name': item,
            'mac': hostvars[inventory_hostname]['ansible_' + item].macaddress | default(''),
            'has_ip': hostvars[inventory_hostname]['ansible_' + item].ipv4 is defined}] }}"
      with_items: "{{ ansible_interfaces }}"
      when: item != 'lo'

    - name: Debug interface info
      debug:
        var: interface_info

    - name: Assign External interface (enp1s0 - bridge connection)
      set_fact:
        external_net_interface: "enp1s0"
        external_net_mac: "{{ hostvars[inventory_hostname]['ansible_enp1s0'].macaddress }}"
      when: "'enp1s0' in ansible_interfaces"

    - name: Fail if enp1s0 not found
      fail:
        msg: "enp1s0 not found. Expected interfaces: enp1s0, enp2s0, enp3s0"
      when: external_net_interface is not defined

    - name: Assign External-nat interface (enp2s0 - WiFi/fallback)
      set_fact:
        external_nat_interface: "enp2s0"
        external_nat_mac: "{{ hostvars[inventory_hostname]['ansible_enp2s0'].macaddress }}"
      when: "'enp2s0' in ansible_interfaces"

    - name: Assign Intranet interface (enp3s0 - internal VMs)
      set_fact:
        intranet_interface: "enp3s0"
        intranet_mac: "{{ hostvars[inventory_hostname]['ansible_enp3s0'].macaddress }}"
      when: "'enp3s0' in ansible_interfaces"

    - name: Debug interface assignments
      debug:
        msg:
          - "External (enp1s0): {{ external_net_interface }} ({{ external_net_mac }}) - Static IP {{ external_static_ip }}"
          - "External-nat (enp2s0): {{ external_nat_interface }} ({{ external_nat_mac }}) - DHCP fallback"
          - "Intranet (enp3s0): {{ intranet_interface }} ({{ intranet_mac }}) - Static IP {{ intranet_static_ip }}"

    - name: Configure NetworkManager connections
      block:
        - name: Ensure system-connections directory exists
          file:
            state: directory
            path: /etc/NetworkManager/system-connections
            mode: '0700'

        - name: Install External connection (bridge - priority 200)
          template:
            src: external.nmconnection
            dest: /etc/NetworkManager/system-connections/external.nmconnection
            owner: root
            group: root
            mode: '0600'

        - name: Install External-nat connection (WiFi fallback - priority 100)
          template:
            src: external-nat.nmconnection
            dest: /etc/NetworkManager/system-connections/external-nat.nmconnection
            owner: root
            group: root
            mode: '0600'

        - name: Install Intranet connection (internal VMs)
          template:
            src: intranet.nmconnection
            dest: /etc/NetworkManager/system-connections/intranet.nmconnection
            owner: root
            group: root
            mode: '0600'

        - name: Reload NetworkManager connections
          shell: "nmcli con reload && sleep 2"

        - name: Activate External connection (highest priority)
          shell: "nmcli con up External || true"

        - name: Wait for External connection to come up
          wait_for:
            timeout: 10

        - name: Check if External connection has IP
          shell: "nmcli -g IP4.ADDRESS con show External | head -1"
          register: external_ip_check
          ignore_errors: true

        - name: Activate External-nat if External has no IP
          shell: "nmcli con up External-nat || true"
          when: external_ip_check.stdout == ""

    - name: Update packages
      yum:
        name: "*"
        state: latest

    - name: Install dnsmasq
      yum:
        name: dnsmasq
        state: latest

    - name: Install configuration file for dnsmasq
      template:
        src: dnsmasq.conf
        dest: /etc/dnsmasq.conf
        owner: root
        group: root
        mode: '0644'

    - name: Enable and start dnsmasq service
      systemd:
        name: dnsmasq
        enabled: true
        state: started

    - name: Insert line in hosts file
      lineinfile:
        path: /etc/hosts
        line: "{{ intranet_static_ip }}\t{{ ansible_hostname }}"

    - name: Enable IPv4 forwarding
      shell: |
        echo "net.ipv4.ip_forward=1" > /etc/sysctl.d/ip4fw.conf
        sysctl -p /etc/sysctl.d/ip4fw.conf

    - name: Set default firewalld zone to internal
      shell: |
        firewall-cmd --set-default-zone internal
        firewall-cmd --reload

    - name: Configure firewall for router
      block:
        - name: Enable masquerading on internal zone
          shell: |
            firewall-cmd --zone=internal --add-masquerade --permanent
            firewall-cmd --zone=internal --add-masquerade

        - name: Allow DNS and DHCP services
          shell: |
            firewall-cmd --zone=internal --add-service={{ item }} --permanent
            firewall-cmd --zone=internal --add-service={{ item }}
          loop:
            - dns
            - dhcp

        - name: Allow external interface in public zone
          shell: |
            firewall-cmd --zone=public --add-interface={{ external_net_interface }} --permanent || true
            firewall-cmd --zone=public --add-interface={{ external_net_interface }} || true
          ignore_errors: true

        - name: Allow external-nat interface in public zone
          shell: |
            firewall-cmd --zone=public --add-interface={{ external_nat_interface }} --permanent || true
            firewall-cmd --zone=public --add-interface={{ external_nat_interface }} || true
          ignore_errors: true

        - name: Reload firewalld
          command: firewall-cmd --reload

    - name: Display final network status
      shell: |
        echo "=== Network Connections ==="
        nmcli con show --active
        echo ""
        echo "=== IP Addresses ==="
        ip -4 addr show
        echo ""
        echo "=== Default Route ==="
        ip route | grep default
        echo ""
        echo "=== Internet Connectivity Test ==="
        ping -c 2 -W 3 8.8.8.8 && echo "Internet: OK" || echo "Internet: FAILED"
      register: network_status
      ignore_errors: true

    - name: Show network status
      debug:
        var: network_status.stdout_lines

  handlers:
    - name: reload NetworkManager
      service:
        name: NetworkManager
        state: reloaded
